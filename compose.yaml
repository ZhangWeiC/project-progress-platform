services:
  api:
    build:
      context: .
      target: api
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DATA_DIR: /app/data
      INITIAL_USER_PASSWORD: ${INITIAL_USER_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - app_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:4000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  web:
    build:
      context: .
      target: web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  app_data:
